version: '3'
services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    volumes:
      - ./data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: sakshiDB
      POSTGRES_USER: sakshiuser
      POSTGRES_PASSWORD: "00S@kshi00"
      
  adminer:
    image: adminer
    container_name: adminer_ui
    restart: always
    ports:
      - "8080:8080"
    
    